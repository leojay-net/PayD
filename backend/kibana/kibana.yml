server.host: "0.0.0.0"
server.name: "payd-kibana"
elasticsearch.hosts: ["http://elasticsearch:9200"]

# Disable telemetry
telemetry.enabled: false
telemetry.optIn: false

# Logging
logging.appenders.console.type: console
logging.appenders.console.layout.type: pattern
logging.root.level: warn

# Saved objects encryption (generate a real 32-char key for production)
xpack.encryptedSavedObjects.encryptionKey: "payd-kibana-encryption-key-32chars!"

# Security (disabled — same as Elasticsearch in this dev config)
xpack.security.enabled: false
