# ──────────────────────────────────────────────────────────────────────────────
# PayD Logstash Pipeline
#
# Input sources:
#   • TCP port 5000  — structured JSON logs shipped directly from the app
#   • File           — JSON log files written by Winston file transport
#
# Processing:
#   • Parse JSON payload
#   • Enrich with environment metadata
#   • Route error/warn logs to a separate high-priority index
#
# Output:
#   • Elasticsearch indices:
#       payd-logs-YYYY.MM.DD         (all logs)
#       payd-errors-YYYY.MM.DD       (error/warn only — for alerting)
# ──────────────────────────────────────────────────────────────────────────────

input {
  # TCP input — app ships logs as JSON lines to port 5000
  tcp {
    port  => 5000
    codec => json_lines
    tags  => ["tcp_input"]
  }

  # File input — read Winston log files inside the container
  file {
    path           => "/app/logs/combined.log"
    start_position => "beginning"
    sincedb_path   => "/dev/null"
    codec          => json
    tags           => ["file_input"]
  }

  file {
    path           => "/app/logs/error.log"
    start_position => "beginning"
    sincedb_path   => "/dev/null"
    codec          => json
    tags           => ["file_input", "error_file"]
  }
}

filter {
  # Parse nested JSON if message is a string payload
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "parsed"
      skip_on_invalid_json => true
    }
    if [parsed] {
      ruby {
        code => "
          parsed = event.get('parsed')
          parsed.each { |k, v| event.set(k, v) } if parsed.is_a?(Hash)
          event.remove('parsed')
        "
      }
    }
  }

  # Normalise timestamp field
  if [@timestamp] {
    date {
      match    => ["@timestamp", "ISO8601"]
      timezone => "UTC"
    }
  }

  # Add environment metadata
  mutate {
    add_field => {
      "[@metadata][environment]" => "${NODE_ENV:development}"
      "app"                      => "payd-backend"
    }
  }

  # Trim large stack traces to 4 KB to prevent mapping explosions
  if [stack] {
    truncate {
      fields        => "stack"
      length_bytes  => 4096
    }
  }

  # Drop health-check noise
  if [url] in ["/health", "/metrics"] {
    drop {}
  }
}

output {
  # All logs → daily index
  elasticsearch {
    hosts            => ["http://elasticsearch:9200"]
    index            => "payd-logs-%{+YYYY.MM.dd}"
    document_type    => "_doc"
    ilm_enabled      => false
    manage_template  => true
    template_name    => "payd-logs"
    template         => "/usr/share/logstash/pipeline/payd-logs-template.json"
    template_overwrite => true
  }

  # Error/warn logs also → high-priority index (feeds Kibana alert rule)
  if [level] in ["error", "warn"] {
    elasticsearch {
      hosts  => ["http://elasticsearch:9200"]
      index  => "payd-errors-%{+YYYY.MM.dd}"
      ilm_enabled => false
    }
  }

  # Debug: uncomment to print events to Logstash stdout
  # stdout { codec => rubydebug }
}
